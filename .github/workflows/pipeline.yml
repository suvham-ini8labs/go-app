name: cicd

on:
  push:
    branches: [ "main" ]

jobs:
  push:
    runs-on: self-hosted
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
    - name: checkout code
      uses: actions/checkout@v6.0.2

    - name: setup docker
      uses: docker/setup-docker-action@v5
      with:
        version: latest
        rootless: true

    - name: docker login
      uses: docker/login-action@v4.0.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: generate image tag
      id: tag
      run: echo "tag=${{ github.run_number }}" >> $GITHUB_OUTPUT
      
    - name: build and push
      uses: docker/build-push-action@v7.0.0
      with:
        push: true
        context: ./app/
        tags: ${{ secrets.DOCKER_IMAGE }}:${{ steps.tag.outputs.tag }}
       
  deploy:
    runs-on: self-hosted
    name: deploy
    needs: push

    steps:
    - name: checkout code
      uses: actions/checkout@v6.0.2

    - name: save kubeconfig
      run: |
        mkdir .kube
        touch .kube/config
        echo "${{ secrets.KUBECONFIG }}" > .kube/config

    - name: deploy with helm
      env: 
        KUBECONFIG: .kube/config
      run: helm upgrade app app_chart --namespace dev --set deployment.pod.container.tag=${{ needs.push.outputs.image-tag }}